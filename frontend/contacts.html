<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackConnect — Contacts</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .add-contact-box {
      background: linear-gradient(135deg, rgba(0,224,255,0.06), rgba(124,92,252,0.06));
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }
    .add-contact-box h3 { font-family: var(--font-display); font-size: 16px; margin-bottom: 4px; }
    .add-contact-box p  { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
    .phone-row { display: flex; gap: 10px; }
    .phone-row .form-control { flex: 1; }
    .contact-count { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
    .search-bar { position: relative; margin-bottom: 16px; }
    .search-bar input { padding-left: 40px; }
    .search-bar .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">

    <div class="page-header fade-in">
      <h1>👥 Contacts</h1>
      <p>Manage your trusted tracking contacts</p>
    </div>

    <div class="add-contact-box fade-in">
      <h3>Add Contact by Phone Number</h3>
      <p>Enter someone's phone number to send them a tracking request. They must be registered on TrackConnect.</p>
      <div class="phone-row">
        <input class="form-control" type="tel" id="phone-input" placeholder="+91 98765 43210" maxlength="20">
        <button class="btn btn-primary" id="btn-send-request">
          <span id="send-text">Send Request</span>
          <span class="spinner hidden" id="send-spinner"></span>
        </button>
      </div>
      <p id="phone-feedback" style="margin-top:10px;font-size:13px;"></p>
    </div>

    <div class="glass-card fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="section-title" style="margin-bottom:0">My Contacts</h2>
        <span class="contact-count" id="contact-count"></span>
      </div>

      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input class="form-control" type="text" id="search-contacts" placeholder="Search by name or phone…">
      </div>

      <div id="contacts-list">
        <div class="loading-overlay"><div class="spinner"></div><span>Loading contacts…</span></div>
      </div>
    </div>

  </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="js/socket.js"></script>
<script>
  // Scoping data inside an IIFE/block scope to keep global scope clean
  (() => {
    Auth.requireAuth();
    injectSidebar();
    initSidebar('contacts');
    loadPendingBadge();

    let allContacts = [];
    
    // DOM Element Cache
    const contactsListEl = document.getElementById('contacts-list');
    const contactCountEl = document.getElementById('contact-count');
    const phoneInputEl = document.getElementById('phone-input');
    const phoneFeedbackEl = document.getElementById('phone-feedback');
    const sendTextEl = document.getElementById('send-text');
    const sendSpinnerEl = document.getElementById('send-spinner');
    const sendRequestBtn = document.getElementById('btn-send-request');
    const searchContactsEl = document.getElementById('search-contacts');

    async function loadContacts() {
      const res = await apiFetch('/contacts');
      if (!res || !res.ok) {
        contactsListEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p>Failed to load contacts.</p>
          </div>`;
        return;
      }
      allContacts = res.data?.contacts || [];
      renderContacts(allContacts);
      updateContactCount(allContacts.length);
    }

    function updateContactCount(count) {
      contactCountEl.textContent = `${count} contact${count !== 1 ? 's' : ''}`;
    }

    function renderContacts(contacts) {
      if (contacts.length === 0) {
        contactsListEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <h3>No contacts yet</h3>
            <p>Send a tracking request by entering a phone number above.</p>
          </div>`;
        return;
      }

      contactsListEl.innerHTML = `
        <div class="item-list">
          ${contacts.map(c => `
            <div class="item-card fade-in" id="contact-row-${c.contact_id}">
              <div class="avatar">
                ${c.profile_image 
                  ? `<img src="${API_BASE}${c.profile_image}" alt="${c.name}">` 
                  : `<span>${c.name.charAt(0).toUpperCase()}</span>`
                }
              </div>
              <div class="item-info">
                <div class="item-name">${c.name}</div>
                <div class="item-sub">${c.phone} · Added ${timeAgo(c.created_at)}</div>
              </div>
              <div class="item-actions">
                ${c.is_online ? '<span class="badge badge-online">🟢 Online</span>' : '<span class="text-muted" style="font-size:12px">Offline</span>'}
                <a href="tracking.html?track=${c.contact_id}" class="btn btn-sm btn-secondary" title="Track">🗺️</a>
                <button class="btn btn-sm btn-danger data-remove-btn" data-id="${c.contact_id}" data-name="${c.name}" title="Remove">🗑️</button>
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    async function removeContact(contactId, name) {
      if (!confirm(`Remove ${name} from your contacts? They will no longer be able to track you.`)) return;
      
      const res = await apiFetch(`/contacts/${contactId}`, { method: 'DELETE' });
      if (res?.ok) {
        Toast.success('Removed', `${name} removed from contacts.`);
        allContacts = allContacts.filter(c => c.contact_id !== contactId);
        renderContacts(allContacts);
        updateContactCount(allContacts.length);
      } else {
        Toast.error('Error', res?.data?.message || 'Could not remove contact.');
      }
    }

    // Event Delegation for Delete Buttons (replaces messy inline onclick handlers)
    contactsListEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.data-remove-btn');
      if (btn) {
        const id = parseInt(btn.getAttribute('data-id'), 10);
        const name = btn.getAttribute('data-name');
        removeContact(id, name);
      }
    });

    // Search Filtering
    searchContactsEl.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      const filtered = allContacts.filter(c =>
        c.name.toLowerCase().includes(q) || c.phone.toLowerCase().includes(q)
      );
      renderContacts(filtered);
    });

    // Send Request Handler
    sendRequestBtn.addEventListener('click', async () => {
      const phone = phoneInputEl.value.trim();
      phoneFeedbackEl.style.color = '';
      phoneFeedbackEl.textContent = '';

      if (!phone) { 
        phoneFeedbackEl.style.color = 'var(--red)'; 
        phoneFeedbackEl.textContent = 'Enter a phone number.'; 
        return; 
      }

      // UI Loading State toggle
      sendTextEl.classList.add('hidden');
      sendSpinnerEl.classList.remove('hidden');
      sendRequestBtn.disabled = true;

      const res = await apiFetch('/contacts/request', {
        method: 'POST',
        body: JSON.stringify({ phone }),
      });

      // UI Normal State toggle
      sendTextEl.classList.remove('hidden');
      sendSpinnerEl.classList.add('hidden');
      sendRequestBtn.disabled = false;

      if (res?.ok) {
        phoneFeedbackEl.style.color = 'var(--green)';
        phoneFeedbackEl.textContent = `✅ ${res.data.message}`;
        phoneInputEl.value = '';
        Toast.success('Request sent', res.data.message);
      } else {
        phoneFeedbackEl.style.color = 'var(--red)';
        phoneFeedbackEl.textContent = `❌ ${res?.data?.message || 'Request failed.'}`;
      }
    });

    // Socket Initialization
    const socket = SocketClient.connect();
    if (socket) {
      socket.on('request_accepted', () => loadContacts());
    }

    // Run on initialization
    loadContacts();
  })();
</script>
</body>
</html>
