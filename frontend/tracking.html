<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackConnect — Live Tracking</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .tracking-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: calc(100vh - 120px); }
    @media (max-width: 900px) { .tracking-layout { grid-template-columns: 1fr; height: auto; } }

    .contact-picker {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .picker-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-glass);
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
    }

    .picker-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }

    .picker-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
    }
    .picker-item:hover { background: var(--bg-glass-light); }
    .picker-item.selected { background: var(--cyan-dim); border-color: var(--border-accent); }

    .picker-item .p-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      overflow: hidden; flex-shrink: 0;
    }
    .picker-item .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .picker-item .p-name { font-size: 14px; font-weight: 500; }
    .picker-item .p-status { font-size: 11px; color: var(--text-secondary); }
    .picker-item .p-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; margin-left: auto; }
    .picker-item.online .p-dot { background: var(--green); }

    .map-panel {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .map-toolbar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tracking-subject {
      font-size: 14px; font-weight: 600;
      flex: 1;
    }

    .last-updated {
      font-size: 12px;
      color: var(--text-secondary);
    }

    #map { flex: 1; min-height: 400px; border-radius: 0; border: none; }

    .map-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px;
      color: var(--text-secondary); text-align: center;
    }
    .map-empty .empty-icon { font-size: 56px; }
    .map-empty h3 { font-size: 18px; color: var(--text-primary); }

    .my-loc-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--bg-glass-light);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-glass);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: var(--transition); color: var(--text-primary);
    }
    .my-loc-toggle.active { background: var(--cyan-dim); border-color: var(--border-accent); color: var(--cyan); }
    .my-loc-toggle:hover { border-color: var(--cyan); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content" style="padding-bottom:0">

    <div class="page-header fade-in">
      <h1>🗺️ Live Tracking</h1>
      <p>Select a contact to see their real-time location</p>
    </div>

    <div class="tracking-layout fade-in">
      <!-- Left: contact picker -->
      <div class="contact-picker">
        <div class="picker-header">📋 My Contacts</div>
        <div class="picker-list" id="picker-list">
          <div style="padding:20px;text-align:center;color:var(--text-secondary)">
            <div class="spinner" style="margin:0 auto 10px"></div>Loading…
          </div>
        </div>
      </div>

      <!-- Right: map -->
      <div class="map-panel" id="map-panel">
        <div class="map-toolbar" id="map-toolbar" style="display:none">
          <span id="tracking-label" class="tracking-subject">Select a contact</span>
          <span class="last-updated" id="last-updated"></span>
          <button class="btn btn-sm btn-secondary" id="btn-center" title="Center map">🎯 Center</button>
          <button class="btn btn-sm btn-danger"    id="btn-stop-track">■ Stop</button>
        </div>
        <div id="map-empty" class="map-empty">
          <div class="empty-icon">🗺️</div>
          <h3>No contact selected</h3>
          <p>Pick a contact from the left panel to begin tracking their live location.</p>
        </div>
        <div id="map" style="display:none"></div>
      </div>
    </div>

  </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="js/socket.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  Auth.requireAuth();
  injectSidebar();
  initSidebar('tracking');
  loadPendingBadge();

  let map = null;
  let markers = {};           // keyed by userId
  let myMarker = null;
  let trackingUserId = null;
  let pollInterval = null;
  let myWatchId = null;
  let sharingMyLoc = false;

  // ---------- Load contacts ----------
  async function loadContacts() {
    const res = await apiFetch('/contacts');
    const list = document.getElementById('picker-list');

    if (!res?.ok || res.data.contacts.length === 0) {
      list.innerHTML = `<div class="empty-state" style="padding:24px">
        <div class="empty-icon">👥</div>
        <p>No contacts yet. <a href="contacts.html">Add one →</a></p>
      </div>`;
      return;
    }

    list.innerHTML = res.data.contacts.map(c => `
      <div class="picker-item ${c.is_online ? 'online' : ''}" id="picker-${c.contact_id}"
           onclick="startTracking(${c.contact_id}, '${c.name}')">
        <div class="p-avatar">
          ${c.profile_image
            ? `<img src="http://const API_BASE = "https://3467-2401-4900-88eb-16c-4165-d666-48c3-2a2b.ngrok-free.app/api"; "https://himself-finder-pace-placed.trycloudflare.com/api";"https://willow-sets-valium-subsequently.trycloudflare.com/api";${c.profile_image}" alt="${c.name}">`
            : `<span>${c.name.charAt(0).toUpperCase()}</span>`}
        </div>
        <div>
          <div class="p-name">${c.name}</div>
          <div class="p-status">${c.phone}</div>
        </div>
        <div class="p-dot" title="${c.is_online ? 'Online' : 'Offline'}"></div>
      </div>`).join('');

    // Auto-track if ?track= param
    const params = new URLSearchParams(window.location.search);
    const autoTrack = params.get('track');
    if (autoTrack) {
      const contact = res.data.contacts.find(c => c.contact_id == autoTrack);
      if (contact) startTracking(contact.contact_id, contact.name);
    }
  }

  // ---------- Init Leaflet map ----------
  function initMap(lat, lng) {
    if (map) return;
    document.getElementById('map-empty').style.display = 'none';
    document.getElementById('map').style.display = 'block';
    document.getElementById('map-toolbar').style.display = 'flex';

    map = L.map('map', { zoomControl: true }).setView([lat, lng], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 20,
    }).addTo(map);
  }

  function makeIcon(color = '#00e0ff', label = '') {
    return L.divIcon({
      className: '',
      html: `<div style="
        width:36px;height:36px;border-radius:50%;
        background:${color};
        border:3px solid #fff;
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
        display:flex;align-items:center;justify-content:center;
        font-size:14px;font-weight:700;color:#111;
        position:relative;">
        ${label.charAt(0).toUpperCase()}
        <div style="
          position:absolute;bottom:-2px;right:-2px;
          width:10px;height:10px;border-radius:50%;
          background:var(--green);border:2px solid #111;"></div>
      </div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -20],
    });
  }

  // ---------- Start tracking a contact ----------
  async function startTracking(userId, name) {
    // Deselect others
    document.querySelectorAll('.picker-item').forEach(el => el.classList.remove('selected'));
    document.getElementById(`picker-${userId}`)?.classList.add('selected');

    stopTracking(false);
    trackingUserId = userId;

    document.getElementById('tracking-label').textContent = `📍 Tracking: ${name}`;

    const res = await apiFetch(`/location/${userId}`);
    if (!res?.ok) {
      Toast.warning('No location', res?.data?.message || 'Location not available yet.');
      document.getElementById('map-empty').style.display = 'flex';
      if (map) { map.remove(); map = null; }
      return;
    }

    const { latitude, longitude } = res.data.location;
    initMap(latitude, longitude);
    updateMarker(userId, name, latitude, longitude);
    document.getElementById('last-updated').textContent = `Updated just now`;

    // Poll every 5 s
    pollInterval = setInterval(() => pollLocation(userId, name), 5000);
  }

  async function pollLocation(userId, name) {
    const res = await apiFetch(`/location/${userId}`);
    if (!res?.ok) return;
    const { latitude, longitude, updated_at } = res.data.location;
    updateMarker(userId, name, latitude, longitude);
    document.getElementById('last-updated').textContent = `Updated ${timeAgo(updated_at)}`;
  }

  function updateMarker(userId, name, lat, lng) {
    if (!map) return;
    if (markers[userId]) {
      markers[userId].setLatLng([lat, lng]);
    } else {
      markers[userId] = L.marker([lat, lng], { icon: makeIcon('#00e0ff', name) })
        .addTo(map)
        .bindPopup(`<b>${name}</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}`);
    }
  }

  function stopTracking(resetUI = true) {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    if (resetUI) {
      trackingUserId = null;
      document.getElementById('tracking-label').textContent = 'Select a contact';
      document.getElementById('last-updated').textContent = '';
      document.querySelectorAll('.picker-item').forEach(el => el.classList.remove('selected'));
      if (map) { map.remove(); map = null; markers = {}; }
      document.getElementById('map').style.display = 'none';
      document.getElementById('map-empty').style.display = 'flex';
      document.getElementById('map-toolbar').style.display = 'none';
    }
  }

  document.getElementById('btn-stop-track').addEventListener('click', () => stopTracking(true));
  document.getElementById('btn-center').addEventListener('click', () => {
    if (map && trackingUserId && markers[trackingUserId]) {
      map.setView(markers[trackingUserId].getLatLng(), 15);
    }
  });

  // ---------- My own location on map ----------
  function startMyLocation() {
    if (!navigator.geolocation) return;
    myWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        if (!map) return;
        if (myMarker) {
          myMarker.setLatLng([latitude, longitude]);
        } else {
          myMarker = L.marker([latitude, longitude], { icon: makeIcon('#7c5cfc', Auth.getUser()?.name || 'Me') })
            .addTo(map)
            .bindPopup('<b>You</b>');
        }
        // Also update backend
        apiFetch('/location/update', { method: 'POST', body: JSON.stringify({ latitude, longitude }) });
        SocketClient.emit('location_update', { latitude, longitude });
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  // ---------- Socket live updates ----------
  const socket = SocketClient.connect();
  if (socket) {
    socket.on('location_update', (data) => {
      if (data.userId === trackingUserId && map) {
        updateMarker(data.userId, document.getElementById('tracking-label').textContent.replace('📍 Tracking: ', ''), data.latitude, data.longitude);
        document.getElementById('last-updated').textContent = 'Updated just now';
      }
    });
  }

  loadContacts();
  startMyLocation();
</script>
</body>
</html>
