<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackConnect — Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 800px) { .profile-grid { grid-template-columns: 1fr; } }

    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-glass);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-secondary); font-weight: 500; }
    .info-value { font-weight: 600; text-align: right; }

    .stat-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-top: 8px;
    }
    .mini-stat {
      background: var(--bg-glass-light);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .mini-stat .val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--cyan); }
    .mini-stat .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    #avatar-file { display: none; }
    .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    .danger-zone { border-color: rgba(255,77,106,0.3); }
    .danger-zone .glass-card-title { color: var(--red); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">

    <div class="page-header fade-in">
      <h1>⚙️ Profile</h1>
      <p>Manage your account information and settings</p>
    </div>

    <!-- Profile header -->
    <div class="glass-card fade-in" style="margin-bottom:24px">
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar-display">
            <span id="avatar-initials">…</span>
          </div>
          <button class="profile-avatar-upload" id="btn-upload-avatar" title="Change photo">✏️</button>
          <input type="file" id="avatar-file" accept="image/jpeg,image/png,image/webp">
        </div>
        <div class="profile-meta">
          <h2 id="profile-name">Loading…</h2>
          <p class="profile-email" id="profile-email"></p>
          <p class="text-muted" id="profile-joined"></p>
        </div>
      </div>

      <div class="stat-row">
        <div class="mini-stat">
          <div class="val" id="stat-contacts">—</div>
          <div class="lbl">Contacts</div>
        </div>
        <div class="mini-stat">
          <div class="val" id="stat-requests">—</div>
          <div class="lbl">Total Requests</div>
        </div>
      </div>
    </div>

    <div class="profile-grid fade-in">
      <!-- Account info -->
      <div class="glass-card">
        <div class="section-title" style="margin-bottom:16px">📋 Account Info</div>
        <div class="info-row"><span class="info-label">Full Name</span><span class="info-value" id="info-name">—</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="info-email">—</span></div>
        <div class="info-row"><span class="info-label">Phone</span><span class="info-value" id="info-phone">—</span></div>
        <div class="info-row"><span class="info-label">Member Since</span><span class="info-value" id="info-joined">—</span></div>
        <div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="badge badge-accepted">🟢 Active</span></span></div>
      </div>

      <!-- Edit profile -->
      <div class="glass-card">
        <div class="section-title" style="margin-bottom:16px">✏️ Edit Profile</div>
        <form id="edit-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-control" type="text" id="edit-name" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label class="form-label">Profile Photo</label>
            <div style="display:flex;align-items:center;gap:12px;">
              <div id="upload-preview" style="width:48px;height:48px;border-radius:50%;background:var(--bg-layer2);border:1px solid var(--border-glass);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:20px;">📷</div>
              <div>
                <button type="button" class="btn btn-sm btn-secondary" onclick="document.getElementById('avatar-file').click()">Choose Image</button>
                <p class="upload-hint">JPG, PNG or WebP · Max 5MB</p>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-save">
            <span id="save-text">Save Changes</span>
            <span class="spinner hidden" id="save-spinner"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Danger zone -->
    <div class="glass-card danger-zone fade-in mt-6">
      <div class="section-title" style="color:var(--red);margin-bottom:12px">⚠️ Danger Zone</div>
      <p class="text-muted" style="margin-bottom:16px">Signing out will end your session and stop live location sharing.</p>
      <button class="btn btn-danger" id="btn-signout">Sign Out of TrackConnect</button>
    </div>

  </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="js/socket.js"></script>
<script>
  Auth.requireAuth();
  injectSidebar();
  initSidebar('profile');
  loadPendingBadge();

  let pendingImageFile = null;

  async function loadProfile() {
    const res = await apiFetch('/profile');
    if (!res?.ok) { Toast.error('Error', 'Failed to load profile.'); return; }

    const p = res.data.profile;
    Auth.setUser(p);

    document.getElementById('profile-name').textContent   = p.name;
    document.getElementById('profile-email').textContent  = p.email;
    document.getElementById('profile-joined').textContent = `Joined ${new Date(p.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}`;

    document.getElementById('avatar-initials').textContent = p.name.charAt(0).toUpperCase();
    if (p.profile_image) {
      document.getElementById('profile-avatar-display').innerHTML =
        `<img src="http://const API_BASE = "https://3467-2401-4900-88eb-16c-4165-d666-48c3-2a2b.https://trackconnect-backend.onrender.com-free.app/api"; "https://himself-finder-pace-placed.trycloudflare.com/api";"https://willow-sets-valium-subsequently.trycloudflare.com/api";${p.profile_image}" alt="${p.name}">`;
    }

    document.getElementById('info-name').textContent   = p.name;
    document.getElementById('info-email').textContent  = p.email;
    document.getElementById('info-phone').textContent  = p.phone;
    document.getElementById('info-joined').textContent = new Date(p.created_at).toLocaleDateString();

    document.getElementById('stat-contacts').textContent  = p.totalContacts;
    document.getElementById('stat-requests').textContent  = p.totalRequests;

    document.getElementById('edit-name').value = p.name;

    // Sidebar avatar
    const sbAvatar = document.getElementById('sb-avatar');
    if (sbAvatar) {
      if (p.profile_image) {
        sbAvatar.innerHTML = `<img src="http://const API_BASE = "https://3467-2401-4900-88eb-16c-4165-d666-48c3-2a2b.https://trackconnect-backend.onrender.com-free.app/api"; "https://himself-finder-pace-placed.trycloudflare.com/api";"https://willow-sets-valium-subsequently.trycloudflare.com/api";${p.profile_image}" alt="${p.name}">`;
      } else {
        sbAvatar.textContent = p.name.charAt(0).toUpperCase();
      }
    }
    const sbName = document.getElementById('sb-name');
    if (sbName) sbName.textContent = p.name;
  }

  // Avatar file picker
  document.getElementById('avatar-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { Toast.error('Too large', 'Max file size is 5MB.'); return; }
    pendingImageFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('upload-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('btn-upload-avatar').addEventListener('click', () => {
    document.getElementById('avatar-file').click();
  });

  // Save
  document.getElementById('edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('edit-name').value.trim();
    if (!name) { Toast.error('Validation', 'Name cannot be empty.'); return; }

    document.getElementById('save-text').classList.add('hidden');
    document.getElementById('save-spinner').classList.remove('hidden');
    document.getElementById('btn-save').disabled = true;

    // Upload image first if selected
    if (pendingImageFile) {
      const fd = new FormData();
      fd.append('image', pendingImageFile);
      const imgRes = await apiFetch('/profile/upload', { method: 'POST', body: fd });
      if (imgRes?.ok) {
        Toast.success('Photo updated', 'Profile image saved.');
        pendingImageFile = null;
      } else {
        Toast.error('Upload failed', imgRes?.data?.message || 'Could not upload image.');
      }
    }

    // Update name
    const res = await apiFetch('/profile', {
      method: 'PUT',
      body: JSON.stringify({ name }),
    });

    document.getElementById('save-text').classList.remove('hidden');
    document.getElementById('save-spinner').classList.add('hidden');
    document.getElementById('btn-save').disabled = false;

    if (res?.ok) {
      Toast.success('Profile updated', 'Your changes have been saved.');
      loadProfile();
    } else {
      Toast.error('Update failed', res?.data?.message || 'Could not update profile.');
    }
  });

  // Sign out
  document.getElementById('btn-signout').addEventListener('click', async () => {
    if (!confirm('Sign out of TrackConnect?')) return;
    await apiFetch('/auth/logout', { method: 'POST' });
    Auth.clear();
    SocketClient.disconnect();
    window.location.href = 'index.html';
  });

  SocketClient.connect();
  loadProfile();
</script>
</body>
</html>
